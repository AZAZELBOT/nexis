site_name: NEXIS
site_description: Engine-agnostic multiplayer backend platform
repo_url: https://github.com/TriForMine/nexis
repo_name: TriForMine/nexis

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - codehilite

nav:
  - Home: index.md
  - Quickstart: QUICKSTART.md
  - Protocol: PROTOCOL.md
  - Architecture: ARCHITECTURE.md
  - WASM Plugins: WASM_PLUGINS.md
  - Load Testing: LOAD_TESTING.md
