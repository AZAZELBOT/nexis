name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish TypeScript SDK to npm"
        required: false
        default: true
        type: boolean
      publish_images:
        description: "Build and publish Docker images to GHCR"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.9
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Rust tests
        working-directory: server
        run: cargo test
      - name: SDK install
        working-directory: sdks/ts
        run: bun install --frozen-lockfile
      - name: SDK tests
        working-directory: sdks/ts
        run: bun test
      - name: SDK typecheck
        working-directory: sdks/ts
        run: bunx tsc -p tsconfig.json --noEmit
      - name: Control API install
        working-directory: dashboard/control-api
        run: bun install --frozen-lockfile
      - name: Control API tests
        working-directory: dashboard/control-api
        run: bun test
      - name: Control API typecheck
        working-directory: dashboard/control-api
        run: bunx tsc --noEmit

  publish-images:
    needs: validate
    if: github.event_name == 'push' || inputs.publish_images == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: rust-server
            dockerfile: server/Dockerfile
          - service: control-api
            dockerfile: dashboard/control-api/Dockerfile
          - service: dashboard-ui
            dockerfile: dashboard/ui/Dockerfile
          - service: web-demo
            dockerfile: examples/web-demo/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha,prefix=sha-
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-sdk-npm:
    needs: validate
    if: github.event_name == 'push' || inputs.publish_npm == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install SDK deps
        working-directory: sdks/ts
        run: bun install --frozen-lockfile
      - name: Test SDK
        working-directory: sdks/ts
        run: bun test
      - name: Typecheck SDK
        working-directory: sdks/ts
        run: bunx tsc -p tsconfig.json --noEmit
      - name: Publish SDK to npm
        working-directory: sdks/ts
        run: npm publish --access public --provenance
